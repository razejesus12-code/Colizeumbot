  :root {
    --bg: #0a0a0d;
    --gold: #f5c518;
    --gold-dim: #a8891a;
    --dark-seg: #17171b;
    --dark-seg2: #1f1f24;
    --jackpot: #e63946;
    --win: #f5c518;
    --text: #ffffff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body {
    background:
      radial-gradient(ellipse 70% 45% at 50% 18%, rgba(245,197,24,.16), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 78%, rgba(230,57,70,.14), transparent 65%),
      radial-gradient(circle at 50% 50%, #141416 0%, #0a0a0d 65%, #050506 100%);
    background-attachment: fixed;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .5;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 75%);
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 75%);
  }

  .wrap {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 26px 16px 36px;
  }

  .brand-logo {
    width: min(220px, 62vw);
    height: auto;
    margin-bottom: 6px;
    filter: drop-shadow(0 0 16px rgba(245,197,24,.3));
  }
  .brand-logo svg { width: 100%; height: auto; display: block; }

  .subtitle {
    font-family: "Colizeum", sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .4px;
    color: #b9b9c0;
    margin-bottom: 22px;
    text-align: center;
  }

  .wheel-outer {
    position: relative;
    width: min(320px, 82vw);
    height: min(320px, 82vw);
    margin: 10px 0 26px;
  }

  .wheel-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,197,24,.25), rgba(230,57,70,.12) 55%, transparent 72%);
    filter: blur(6px);
    z-index: 0;
  }

  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 26px solid var(--gold);
    z-index: 10;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.6));
  }

  .wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    z-index: 1;
    border: 6px solid var(--gold);
    box-shadow:
      0 0 0 3px #000,
      0 10px 34px rgba(0,0,0,.65),
      inset 0 0 26px rgba(0,0,0,.55);
    background: conic-gradient(from 0deg,
      #17171b 0deg 45deg,
      #1f1f24 45deg 90deg,
      #f5c518 90deg 135deg,
      #17171b 135deg 180deg,
      #1f1f24 180deg 225deg,
      #17171b 225deg 270deg,
      #1f1f24 270deg 315deg,
      #e63946 315deg 360deg
    );
    transition: transform 4.2s cubic-bezier(0.15, 0.7, 0.1, 1);
  }

  .wheel.locked {
    filter: grayscale(0.85) brightness(.55);
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    width: 56px; height: 56px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 35% 30%, #2a2a2e, #0a0a0d 70%);
    border: 3px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    box-shadow: 0 0 14px rgba(245,197,24,.4);
  }
  .wheel-center svg { width: 40px; height: 40px; }

  .seg-label {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,.7);
    white-space: nowrap;
  }
  .seg-label span {
    display: inline-block;
    transform: translate(-50%, -128px);
  }
  .seg-label.prize span {
    font-family: "Colizeum", sans-serif;
    font-size: 14px;
    font-weight: 400;
  }

  .lock-badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    font-size: 40px;
    display: none;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.7));
  }
  .lock-badge.show { display: block; }

  button#spinBtn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    font-family: "Colizeum", sans-serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: .5px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(245,197,24,.3);
    transition: transform .1s, opacity .2s;
  }
  button#spinBtn:active { transform: scale(0.96); }
  button#spinBtn:disabled {
    background: #333;
    color: #777;
    box-shadow: none;
    cursor: default;
  }

  .status-text {
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    text-align: center;
    min-height: 20px;
    max-width: 300px;
  }

  .progress-wrap {
    margin-top: 10px;
    width: min(260px, 80vw);
  }
  .progress-track {
    background: #201f22;
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    border: 1px solid #2c2b2f;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 8px;
    transition: width .4s ease;
  }
  .progress-label {
    font-size: 11px;
    color: #888;
    margin-top: 6px;
    text-align: center;
  }

  .result-card {
    display: none;
    margin-top: 20px;
    background: linear-gradient(180deg, #17171a, #101012);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    max-width: 320px;
    box-shadow: 0 8px 26px rgba(0,0,0,.5);
  }
  .result-card.show { display: block; }
  .result-title {
    font-family: "Colizeum", sans-serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 8px;
  }
  .result-amount { font-size: 16px; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
  .result-code {
    font-family: monospace;
    font-size: 20px;
    letter-spacing: 2px;
    background: #000;
    border-radius: 8px;
    padding: 8px 14px;
    display: inline-block;
  }
  .result-hint { font-size: 12px; color: #999; margin-top: 10px; }
</style>
</head>
<body>

      <div class="seg-label" style="transform: rotate(157.5deg)"><span>😔</span></div>
      <div class="seg-label" style="transform: rotate(202.5deg)"><span>😔</span></div>
      <div class="seg-label" style="transform: rotate(247.5deg)"><span>😔</span></div>
      <div class="seg-label" style="transform: rotate(292.5deg)"><span>😔</span></div>
      <div class="seg-label prize" style="transform: rotate(337.5deg)"><span>🎉{{JACKPOT_POINTS}}</span></div>
      <div class="wheel-center"><svg id="Слой_1" data-name="Слой 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70.54 70.78"><defs><style>.cls-1{fill:#0a0a0d;}.cls-1,.cls-2{fill-rule:evenodd;}.cls-2{fill:#ffe265;}.cls-3{fill:#fff;}</style></defs><path class="cls-1" d="M35.27,0A35.39,35.39,0,1,0,70.54,35.39,35.33,35.33,0,0,0,35.27,0Zm0,2.09A33.24,33.24,0,0,1,66.65,24H3.86A33.27,33.27,0,0,1,35.26,2.09Zm0,66.58a33.25,33.25,0,0,1-31.78-23H32.09A27.06,27.06,0,0,0,35.27,41a27.58,27.58,0,0,0,3.17,4.69H67.05A33.22,33.22,0,0,1,35.28,68.67Z"/><path class="cls-2" d="M67.05,45.67a33.45,33.45,0,0,1-63.55,0H32.09A27.06,27.06,0,0,0,35.27,41a27.58,27.58,0,0,0,3.17,4.69Z"/><path class="cls-2" d="M66.65,24H3.86a33.46,33.46,0,0,1,62.79,0Z"/><path class="cls-3" d="M22.71,28.93l-3.32,3.33-3.31-3.33a1.53,1.53,0,0,0-1-.41A1.5,1.5,0,0,0,14,31l3.32,3.33L14,37.7a1.49,1.49,0,0,0,0,2.07,1.42,1.42,0,0,0,1,.44,1.52,1.52,0,0,0,1-.4l3.31-3.33,3.32,3.33a1.6,1.6,0,0,0,.49.36,1.44,1.44,0,0,0,.58.13,1.5,1.5,0,0,0,.59-.1,1.43,1.43,0,0,0,.5-.34,1.29,1.29,0,0,0,.33-.5,1.34,1.34,0,0,0,.1-.59,1.45,1.45,0,0,0-.13-.59,1.55,1.55,0,0,0-.36-.48L21.5,34.37,24.82,31a1.54,1.54,0,0,0,.36-1,1.51,1.51,0,0,0-.44-1,1.48,1.48,0,0,0-2-.08Z"/><path class="cls-3" d="M49.78,42.16a7.72,7.72,0,1,1,5.44-2.26A7.7,7.7,0,0,1,49.78,42.16Zm0-12.19a4.44,4.44,0,0,0-2.47.76,4.46,4.46,0,0,0-1.89,4.59,4.39,4.39,0,0,0,1.22,2.28,4.41,4.41,0,0,0,4.85,1,4.4,4.4,0,0,0,2-1.64,4.49,4.49,0,0,0,.75-2.48,4.4,4.4,0,0,0-1.3-3.17A4.53,4.53,0,0,0,49.78,30Z"/></svg></div>

  <button id="spinBtn" disabled>Загрузка...</button>
  <div class="status-text" id="statusText"></div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-amount" id="resultAmount"></div>
    <div class="result-code" id="resultCode"></div>
    <div class="result-hint" id="resultHint">Покажи это администратору на стойке</div>
  </div>
</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const initData = tg ? tg.initData : "";

  const wheelEl = document.getElementById("wheel");
  const lockBadge = document.getElementById("lockBadge");
  const spinBtn = document.getElementById("spinBtn");
  const statusText = document.getElementById("statusText");
  const progressWrap = document.getElementById("progressWrap");
  const progressFill = document.getElementById("progressFill");
  const progressLabel = document.getElementById("progressLabel");
  const resultCard = document.getElementById("resultCard");
  const resultTitle = document.getElementById("resultTitle");
  const resultAmount = document.getElementById("resultAmount");
  const resultCode = document.getElementById("resultCode");
  const resultHint = document.getElementById("resultHint");

  let requiredTierLabel = "нужного статуса";

  let currentRotation = 0;
  let spinning = false;

  function spinTo(segmentIndex) {
    const segAngle = 45;
    const targetCenter = segmentIndex * segAngle + segAngle / 2;
    const currentMod = ((currentRotation % 360) + 360) % 360;
    const desiredMod = (360 - targetCenter) % 360;
    let delta = desiredMod - currentMod;
    if (delta <= 0) delta += 360;
    currentRotation += 5 * 360 + delta;
    wheelEl.style.transform = `rotate(${currentRotation}deg)`;
  }

  function showLocked(data) {
    wheelEl.classList.add("locked");
    lockBadge.classList.add("show");
    spinBtn.textContent = "🔒 Заблокировано";
    const need = data.visits_needed || 0;
    const have = data.visits || 0;
    const left = Math.max(need - have, 0);
    statusText.textContent = `Доступно со статуса ${data.required_tier_label || "нужного статуса"}. Твой статус: ${data.tier_label || "Без статуса"}`;
    progressWrap.style.display = "block";
    const pct = need ? Math.min((have / need) * 100, 100) : 0;
    progressFill.style.width = pct + "%";
    progressLabel.textContent = `Визитов: ${have} из ${need} — осталось ${left}`;
  }

  async function checkStatus() {
    if (!initData) {
      statusText.textContent = "Открой это через кнопку в боте, не напрямую в браузере.";
      spinBtn.textContent = "Недоступно";
      return;
    }
    try {
      const res = await fetch("/wheel/status?initData=" + encodeURIComponent(initData));
      const data = await res.json();

      if (!res.ok) {
        statusText.textContent = "Не удалось проверить статус, попробуй позже.";
        spinBtn.textContent = "Недоступно";
        return;
      }
      if (!data.subscribed) {
        statusText.textContent = "Открой бота и поделись номером телефона, чтобы завершить регистрацию 🙂";
        spinBtn.textContent = "Недоступно";
        return;
      }
      if (data.required_tier_label) {
        requiredTierLabel = data.required_tier_label;
      }
      if (!data.eligible) {
        showLocked(data);
        spinBtn.disabled = true;
        return;
      }
      if (data.can_spin) {
        spinBtn.disabled = false;
        spinBtn.textContent = "🎡 Крутить!";
        statusText.textContent = "Один спин в день — не упусти шанс!";
      } else {
        spinBtn.disabled = true;
        spinBtn.textContent = "Уже крутил сегодня";
        statusText.textContent = "Приходи завтра за новой попыткой 🎰";
      }
    } catch (e) {
      statusText.textContent = "Ошибка соединения. Попробуй ещё раз.";
      spinBtn.textContent = "Недоступно";
    }
  }

  spinBtn.addEventListener("click", async () => {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    resultCard.classList.remove("show");
    statusText.textContent = "Крутим...";

    try {
      const res = await fetch("/wheel/spin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData }),
      });
      const data = await res.json();

      if (!res.ok) {
        if (data.error === "already_spun") {
          statusText.textContent = "Уже крутил сегодня, приходи завтра!";
        } else if (data.error === "not_eligible") {
          statusText.textContent = `Доступно только со статуса ${requiredTierLabel} и выше.`;
        } else {
          statusText.textContent = "Не получилось, попробуй позже.";
        }
        spinning = false;
        return;
      }

      spinTo(data.segment_index);

      setTimeout(() => {
        spinning = false;
        statusText.textContent = "";
        if (data.prize_type === "lose") {
          resultTitle.textContent = "Почти! Не повезло 😅";
          resultAmount.textContent = "Приходи завтра — будет ещё один спин!";
          resultCode.style.display = "none";
          resultHint.style.display = "none";
        } else {
          resultTitle.textContent = data.prize_type === "jackpot" ? "🎉 ДЖЕКПОТ!" : "🎉 Выигрыш!";
          resultAmount.textContent = "Бонус: " + data.amount;
          resultCode.style.display = "inline-block";
          resultCode.textContent = data.code;
          resultHint.style.display = "block";
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        }
        resultCard.classList.add("show");
        spinBtn.textContent = "Уже крутил сегодня";
      }, 4400);
    } catch (e) {
      statusText.textContent = "Ошибка соединения. Попробуй ещё раз.";
      spinBtn.disabled = false;
      spinning = false;
    }
  });

  checkStatus();
</script>
